<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert's Video Screensaver</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: black; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Share Tech Mono', monospace; 
            cursor: none;
        }

        .vcr-text {
            color: #ebebeb;
            text-shadow: 1px 1px #000;
            filter: blur(0.2px);
            letter-spacing: 2px;
        }

        /* Toned down Neon Sign Effects */
        .neon-pink {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff00de, 0 0 20px #ff00de;
        }
        .neon-blue {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #00d2ff, 0 0 20px #00d2ff;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.85; }
        }
        .neon-flicker { animation: flicker 4s infinite; }

        /* VHS Tracking Line */
        @keyframes tracking {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { top: 110%; opacity: 0; }
        }
        .vhs-tracking {
            position: fixed;
            left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
            z-index: 150;
            animation: tracking 12s infinite linear;
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1.05) translate(-50%, -50%); opacity: 0.3; }
            50% { transform: scale(1.1) translate(-50%, -50%); opacity: 0.5; }
        }
        .bg-pulse {
            position: absolute; top: 50%; left: 50%;
            min-width: 110%; min-height: 110%;
            animation: pulse-bg 25s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>
    <div class="vhs-tracking"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- USER CONFIG ---
        const TMDB_API_KEY = "6ae71efb7a4441efb04f3b77764589c3"; 
        const PUBLISHED_ID = "2PACX-1vTpYGbkD2AliFONt-zZz2wXOHXR1z6nHRdnF00KW-e66JwK18f_NIXtYp0cGC1s1JzeIG3UznGt6b0w";
        const ROTATION_SPEED = 15000; 

        const RetroLogo = () => (
            <div className="fixed top-8 right-12 z-[110] flex flex-col items-center neon-flicker scale-75 lg:scale-100 origin-top-right">
                <svg width="220" height="100" viewBox="0 0 220 100">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <path d="M10 10 L210 10 L210 90 L10 90 Z" fill="none" stroke="#ff00de" strokeWidth="2" filter="url(#glow)" style={{opacity: 0.7}} />
                    <text x="50%" y="42" textAnchor="middle" fill="#fff" style={{fontFamily: 'Archivo Black', fontSize: '18px'}} filter="url(#glow)" className="neon-pink">ROBERT'S</text>
                    <text x="50%" y="72" textAnchor="middle" fill="#fff" style={{fontFamily: 'Archivo Black', fontSize: '24px'}} filter="url(#glow)" className="neon-blue">VIDEO STORE</text>
                </svg>
                <div className="text-[10px] tracking-[0.6em] vcr-text opacity-40 mt-[-10px]">PREMIUM RENTALS</div>
            </div>
        );

        const RetroClock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="fixed bottom-8 left-12 z-[110] space-y-1 opacity-90 neon-flicker">
                    <div className="flex items-center gap-4 neon-blue text-2xl lg:text-4xl font-bold">
                        <span className="text-sm border border-white/40 px-2 py-0.5 tracking-tighter opacity-70">VCR1</span>
                        <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }).toUpperCase()}</span>
                    </div>
                    <div className="text-lg lg:text-2xl neon-pink opacity-80 tracking-widest pl-12">
                        {time.toLocaleDateString([], { month: 'short', day: '2-digit', year: 'numeric' }).toUpperCase()}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [movies, setMovies] = useState([]);
            const [index, setIndex] = useState(0);
            const [loading, setLoading] = useState(true);
            const [activeMovie, setActiveMovie] = useState(null);
            const [errorMsg, setErrorMsg] = useState(null);

            const parseCSV = (csvText) => {
                const lines = csvText.split('\n');
                return lines.map(line => {
                    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!parts[0]) return null;
                    return {
                        title: parts[0].replace(/"/g, '').trim(),
                        label: parts[1]?.replace(/"/g, '').trim() || "CLASSIC SELECTION"
                    };
                }).filter(m => m && m.title && !m.title.toLowerCase().includes("title"));
            };

            const shuffleArray = (array) => {
                let currentIndex = array.length,  randomIndex;
                while (currentIndex != 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
                return array;
            };

            useEffect(() => {
                const init = async () => {
                    try {
                        const csvUrl = `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?output=csv`;
                        const response = await fetch(csvUrl);
                        if (!response.ok) throw new Error(`Tape Access Denied (Status ${response.status})`);
                        
                        const csvText = await response.text();
                        const movieRows = parseCSV(csvText);

                        const enriched = await Promise.all(movieRows.slice(0, 100).map(async (m) => {
                            try {
                                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(m.title)}`);
                                const data = await res.json();
                                const movie = data.results?.[0];
                                if (!movie) return null;
                                const details = await (await fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&append_to_response=images`)).json();
                                return { ...m, ...movie, logo: details.images?.logos?.find(l => l.iso_639_1 === 'en' || !l.iso_639_1)?.file_path };
                            } catch (e) { return null; }
                        }));
                        
                        const filtered = enriched.filter(m => m !== null);
                        if (filtered.length === 0) throw new Error("No matches found in Vault.");
                        
                        const shuffledMovies = shuffleArray([...filtered]);
                        setMovies(shuffledMovies);
                        setActiveMovie(shuffledMovies[0]);
                        setLoading(false);
                    } catch (e) { 
                        setErrorMsg(e.message);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (movies.length === 0) return;
                const interval = setInterval(() => setIndex(prev => (prev + 1) % movies.length), ROTATION_SPEED);
                return () => clearInterval(interval);
            }, [movies]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.keyCode === 39) setIndex(prev => (prev + 1) % movies.length);
                    if (e.keyCode === 37) setIndex(prev => (prev - 1 + movies.length) % movies.length);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [movies]);

            useEffect(() => { if (movies[index]) setActiveMovie(movies[index]); }, [index, movies]);

            if (errorMsg) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center p-10 text-center">
                    <div className="neon-pink text-3xl mb-6 uppercase tracking-widest">Tape Error</div>
                    <div className="vcr-text text-lg opacity-80 max-w-2xl">{errorMsg}</div>
                </div>
            );

            if (loading) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center text-3xl">
                    <div className="neon-blue animate-pulse tracking-[0.3em] uppercase">Loading Vault...</div>
                </div>
            );

            return (
                <div className="h-screen w-screen bg-black overflow-hidden relative">
                    <RetroLogo />
                    <RetroClock />
                    
                    {/* Background */}
                    <div className="absolute inset-0">
                        <img 
                            key={`bg-${activeMovie?.id}`}
                            src={`https://image.tmdb.org/t/p/original${activeMovie?.backdrop_path}`}
                            className="bg-pulse object-cover blur-2xl"
                        />
                        <div className="absolute inset-0 bg-black/60" />
                    </div>

                    {/* Content */}
                    <div className="relative z-10 h-full flex flex-col items-center justify-center p-12 lg:p-24">
                        <div className="flex flex-col lg:flex-row items-center gap-12 lg:gap-24 max-w-7xl w-full animate-in fade-in duration-1000">
                            
                            {/* Poster - Added translate-y to move it up */}
                            <div className="relative flex-shrink-0 shadow-[0_0_100px_rgba(0,0,0,1)] transform -translate-y-8 lg:-translate-y-12">
                                <img 
                                    key={`poster-${activeMovie?.id}`}
                                    src={`https://image.tmdb.org/t/p/w780${activeMovie?.poster_path}`}
                                    className="h-[60vh] lg:h-[75vh] w-auto border-[4px] border-white/5 rounded-sm"
                                />
                            </div>

                            {/* Info Side */}
                            <div className="flex flex-col items-center lg:items-start text-center lg:text-left space-y-6 lg:space-y-10 flex-1">
                                {activeMovie?.logo ? (
                                    <img 
                                        key={`logo-${activeMovie?.id}`}
                                        src={`https://image.tmdb.org/t/p/w500${activeMovie.logo}`} 
                                        className="h-28 lg:h-52 object-contain brightness-125 drop-shadow-[0_0_20px_rgba(0,0,0,0.8)]"
                                    />
                                ) : (
                                    <h1 className="text-6xl lg:text-8xl font-black uppercase italic tracking-tighter text-white drop-shadow-2xl">{activeMovie?.title}</h1>
                                )}
                                
                                {/* Release Year - Only the Neon one */}
                                <div className="flex flex-wrap items-center justify-center lg:justify-start gap-4">
                                    <div className="neon-blue text-4xl lg:text-6xl font-black tracking-tighter opacity-90">
                                        {activeMovie?.release_date?.split('-')[0]}
                                    </div>
                                </div>

                                <p className="text-xl lg:text-2xl text-white/80 leading-snug italic font-medium max-w-2xl drop-shadow-lg line-clamp-4 lg:line-clamp-none">
                                    "{activeMovie?.overview}"
                                </p>
                            </div>
                        </div>
                    </div>

                    <FilmGrain />
                </div>
            );
        };

        const FilmGrain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const imageData = ctx.createImageData(canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const noise = Math.random() * 255;
                        data[i] = noise; data[i+1] = noise; data[i+2] = noise; data[i+3] = 15;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    requestAnimationFrame(render);
                };
                window.addEventListener('resize', resize);
                resize(); render();
            }, []);
            return <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 120, opacity: 0.3 }} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
