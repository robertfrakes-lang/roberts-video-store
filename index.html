<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roberts Video Cinema Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; margin: 0; overflow: hidden; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- CONFIGURATION ---
        const TMDB_API_KEY = "6ae71efb7a4441efb04f3b77764589c3"; 
        const GOOGLE_SHEET_ID = "1qpyC0XzvTcKT6EISywvqESX3A0MwQoFDE8p-Bll4hps"; 
        const SHEET_NAME = "Roberts video store application database"; 

        const App = () => {
            const [movies, setMovies] = useState([]);
            const [selectedIndex, setSelectedIndex] = useState(0);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeMovie, setActiveMovie] = useState(null);

            const getCleanId = (idOrUrl) => {
                if (idOrUrl.includes('/d/')) return idOrUrl.split('/d/')[1].split('/')[0];
                return idOrUrl;
            };

            const fetchSheetData = useCallback(async () => {
                const cleanId = getCleanId(GOOGLE_SHEET_ID);
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${cleanId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
                    const response = await fetch(url);
                    const text = await response.text();
                    const json = JSON.parse(text.substring(47, text.length - 2));
                    const rows = json.table.rows.map(row => ({
                        title: row.c[0]?.v, 
                        label: row.c[1]?.v || "ROBERTS VIDEO",
                    })).filter(r => r.title);
                    return rows;
                } catch (err) {
                    setError("Failed to load spreadsheet. Check 'Share' settings.");
                    return [];
                }
            }, []);

            const fetchTMDBData = async (movieTitle) => {
                try {
                    const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(movieTitle)}`;
                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    const movie = data.results[0];
                    if (!movie) return null;

                    const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&append_to_response=images`;
                    const detailRes = await fetch(detailUrl);
                    const details = await detailRes.json();

                    return {
                        ...movie,
                        logo: details.images?.logos?.find(l => l.iso_639_1 === 'en' || !l.iso_639_1)?.file_path,
                    };
                } catch (err) { return null; }
            };

            useEffect(() => {
                const init = async () => {
                    const sheetMovies = await fetchSheetData();
                    const enrichedMovies = await Promise.all(
                        sheetMovies.slice(0, 30).map(async (m) => {
                            const tmdb = await fetchTMDBData(m.title);
                            return tmdb ? { ...m, ...tmdb } : null;
                        })
                    );
                    const filtered = enrichedMovies.filter(m => m !== null);
                    setMovies(filtered);
                    if (filtered.length > 0) setActiveMovie(filtered[0]);
                    setLoading(false);
                };
                init();
            }, []);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (movies.length === 0) return;
                    if (e.keyCode === 39) setSelectedIndex(prev => (prev + 1) % movies.length);
                    if (e.keyCode === 37) setSelectedIndex(prev => (prev - 1 + movies.length) % movies.length);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [movies]);

            useEffect(() => {
                if (movies[selectedIndex]) setActiveMovie(movies[selectedIndex]);
            }, [selectedIndex, movies]);

            if (loading) return (
                <div className="h-screen bg-black flex items-center justify-center text-white">
                    <div className="animate-pulse flex flex-col items-center">
                        <div className="text-4xl font-black tracking-widest text-red-600 mb-4">ROBERTS VIDEO</div>
                        <p className="text-sm uppercase tracking-[0.5em]">Opening Vault...</p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-screen bg-black overflow-hidden relative text-white">
                    <div className="absolute inset-0">
                        <img 
                            key={activeMovie?.backdrop_path}
                            src={`https://image.tmdb.org/t/p/original${activeMovie?.backdrop_path}`}
                            className="w-full h-full object-cover opacity-30 blur-md transition-opacity duration-1000"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent" />
                    </div>

                    <div className="relative z-10 h-full flex flex-col justify-end p-20">
                        <div className="max-w-3xl mb-12">
                            {activeMovie?.logo ? (
                                <img src={`https://image.tmdb.org/t/p/w500${activeMovie.logo}`} className="h-32 mb-6 object-contain" />
                            ) : (
                                <h1 className="text-8xl font-black italic uppercase tracking-tighter mb-4">{activeMovie?.title}</h1>
                            )}
                            <div className="flex items-center space-x-4 mb-6 text-red-500 font-bold tracking-widest">
                                <span>{activeMovie?.release_date?.split('-')[0]}</span>
                                <span className="bg-red-600 text-white px-2 py-0.5 rounded text-[10px]">{activeMovie?.label}</span>
                            </div>
                            <p className="text-xl text-gray-300 line-clamp-3 mb-10">{activeMovie?.overview}</p>
                            <div className="flex space-x-4">
                                <button className="bg-white text-black px-12 py-4 rounded-full font-black">WATCH NOW</button>
                                <button className="bg-white/10 px-12 py-4 rounded-full font-black border border-white/20">DETAILS</button>
                            </div>
                        </div>

                        <div className="flex space-x-8 overflow-x-hidden p-4">
                            {movies.map((movie, idx) => (
                                <div key={idx} className={`flex-shrink-0 transition-all duration-500 ${idx === selectedIndex ? 'scale-110 ring-4 ring-red-600 shadow-2xl opacity-100' : 'scale-100 opacity-30'}`} style={{ width: '180px' }}>
                                    <img src={`https://image.tmdb.org/t/p/w500${movie.poster_path}`} className="w-full h-[270px] object-cover rounded-xl" />
                                </div>
                            ))}
                        </div>
                    </div>
                    <FilmGrain />
                </div>
            );
        };

        const FilmGrain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const imageData = ctx.createImageData(canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const noise = Math.random() * 255;
                        data[i] = noise; data[i+1] = noise; data[i+2] = noise; data[i+3] = 15;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    requestAnimationFrame(render);
                };
                window.addEventListener('resize', resize);
                resize(); render();
            }, []);
            return <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 100, opacity: 0.2 }} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
