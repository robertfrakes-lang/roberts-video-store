<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Dashboard - Movie Poster App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { background-color: black; margin: 0; overflow: hidden; cursor: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Default Loading State -->
        <div style="height: 100vh; background-color: black; display: flex; align-items: center; justify-content: center; color: #dc2626; font-family: 'Share Tech Mono', monospace; font-size: 1.5rem; letter-spacing: 0.2em;">
            INITIALIZING VAULT...
        </div>
    </div>

    <!-- 
      APP CODE 
      Stored as plain text so the browser doesn't crash on invisible spaces.
    -->
    <script id="react-app-code" type="text/plain">
        const { useState, useEffect, useRef, useCallback } = React;

        const PlayIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const InfoIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const FilmIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>;
        const AlertCircleIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        const TMDB_API_KEY = "6ae71efb7a4441efb04f3b77764589c3"; 
        const GOOGLE_SHEET_ID = "1qpyC0XzvTcKT6EISywvqESX3A0MwQoFDE8p-Bll4hps"; 
        const SHEET_NAME = "Roberts video store application database"; 

        const App = () => {
            const [movies, setMovies] = useState([]);
            const [selectedIndex, setSelectedIndex] = useState(0);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeMovie, setActiveMovie] = useState(null);
            
            const rowRef = useRef(null);

            const getCleanId = (idOrUrl) => {
                if (idOrUrl.includes('/d/')) {
                    return idOrUrl.split('/d/')[1].split('/')[0];
                }
                return idOrUrl;
            };

            const fetchSheetData = useCallback(async () => {
                const cleanId = getCleanId(GOOGLE_SHEET_ID);
                if (!cleanId) {
                    setError("Missing Google Sheet ID. Please check the Configuration section.");
                    return [];
                }
                
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${cleanId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
                    const response = await fetch(url);
                    const text = await response.text();
                    
                    const json = JSON.parse(text.substring(47, text.length - 2));
                    const rows = json.table.rows.map(row => ({
                        title: row.c[0]?.v, 
                        collectionInfo: row.c[1]?.v || null, 
                    })).filter(r => r.title);

                    if (rows.length === 0) setError("No movies found in your sheet.");
                    return rows;
                } catch (err) {
                    setError("Failed to load spreadsheet. Check 'Share' settings (Anyone with link).");
                    return [];
                }
            }, []);

            const fetchTMDBData = async (movieTitle) => {
                if (!TMDB_API_KEY) return null;
                try {
                    const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(movieTitle)}`;
                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    const movie = data.results[0];
                    if (!movie) return null;

                    const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&append_to_response=images`;
                    const detailRes = await fetch(detailUrl);
                    const details = await detailRes.json();

                    return {
                        ...movie,
                        logo: details.images?.logos?.find(l => l.iso_639_1 === 'en' || !l.iso_639_1)?.file_path,
                        fullDetails: details
                    };
                } catch (err) {
                    return null;
                }
            };

            useEffect(() => {
                const init = async () => {
                    setLoading(true);
                    const sheetMovies = await fetchSheetData();
                    
                    const enrichedMovies = await Promise.all(
                        sheetMovies.slice(0, 40).map(async (m) => {
                            const tmdb = await fetchTMDBData(m.title);
                            return tmdb ? { ...m, ...tmdb } : null;
                        })
                    );
                    
                    const filtered = enrichedMovies.filter(m => m !== null);
                    setMovies(filtered);
                    if (filtered.length > 0) setActiveMovie(filtered[0]);
                    setLoading(false);
                };
                init();
            }, [fetchSheetData]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (movies.length === 0) return;
                    if (e.keyCode === 39) { 
                        setSelectedIndex(prev => (prev + 1) % movies.length);
                    } else if (e.keyCode === 37) { 
                        setSelectedIndex(prev => (prev - 1 + movies.length) % movies.length);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [movies]);

            useEffect(() => {
                if (movies[selectedIndex]) {
                    setActiveMovie(movies[selectedIndex]);
                    
                    if (rowRef.current) {
                        const selectedElement = rowRef.current.children[selectedIndex];
                        if (selectedElement) {
                            selectedElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                        }
                    }
                }
            }, [selectedIndex, movies]);

            if (error) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center text-white p-10 text-center font-sans">
                    <AlertCircleIcon size={64} className="text-red-500 mb-4" />
                    <h2 className="text-2xl font-bold mb-2">Configuration Error</h2>
                    <p className="text-gray-400 max-w-md">{error}</p>
                </div>
            );

            if (loading) return (
                <div className="h-screen bg-black flex items-center justify-center text-white font-sans">
                    <div className="animate-pulse flex flex-col items-center">
                        <FilmIcon size={64} className="mb-4 text-red-600" />
                        <p className="text-xl tracking-widest uppercase font-black text-red-600">Opening Vault...</p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-screen bg-black overflow-hidden relative font-sans text-white">
                    <div className="absolute inset-0 transition-opacity duration-1000">
                        <img 
                            key={activeMovie?.backdrop_path}
                            src={`https://image.tmdb.org/t/p/original${activeMovie?.backdrop_path}`}
                            className="w-full h-full object-cover filter blur-md scale-105 opacity-30 animate-in fade-in duration-1000"
                            alt=""
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent" />
                    </div>

                    <div className="relative z-10 h-full flex flex-col justify-end p-12 lg:p-20 space-y-8">
                        
                        <div className="max-w-4xl animate-in fade-in slide-in-from-bottom-10 duration-700">
                            {activeMovie?.logo ? (
                                <img 
                                    src={`https://image.tmdb.org/t/p/w500${activeMovie.logo}`}
                                    className="h-28 lg:h-40 mb-6 object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] brightness-125"
                                    alt="logo"
                                />
                            ) : (
                                <h1 className="text-6xl lg:text-8xl font-black italic uppercase tracking-tighter mb-4 leading-none">
                                    {activeMovie?.title}
                                </h1>
                            )}
                            
                            <div className="flex items-center space-x-4 mb-6 text-sm font-bold uppercase tracking-widest">
                                <span className="text-red-500 font-black">{activeMovie?.release_date?.split('-')[0]}</span>
                                
                                {activeMovie?.collectionInfo && (
                                    <span className="text-gray-400 italic border-l border-white/20 pl-4 normal-case tracking-normal font-medium">
                                        {activeMovie.collectionInfo}
                                    </span>
                                )}

                                <div className="flex-1" /> 
                                
                                <div className="flex items-center space-x-3">
                                     <span className="px-2 py-0.5 border border-white/20 rounded text-[10px] text-gray-400">4K ULTRA HD</span>
                                </div>
                            </div>
                            
                            <p className="text-lg lg:text-xl text-gray-300 line-clamp-3 leading-relaxed mb-10 max-w-2xl drop-shadow-md">
                                {activeMovie?.overview}
                            </p>

                            <div className="flex space-x-6">
                                <button className="flex items-center space-x-3 bg-white text-black px-12 py-5 rounded-full font-black tracking-tighter hover:scale-105 transition-transform shadow-xl">
                                    <PlayIcon size={24} className="text-black fill-current" />
                                    <span className="text-xl">WATCH</span>
                                </button>
                                <button className="flex items-center space-x-3 bg-white/10 backdrop-blur-xl text-white border border-white/20 px-12 py-5 rounded-full font-black tracking-tighter hover:bg-white/20 transition-all">
                                    <InfoIcon size={24} />
                                    <span className="text-xl">DETAILS</span>
                                </button>
                            </div>
                        </div>

                        <div className="mt-12">
                            <h2 className="text-xs font-black tracking-[0.4em] uppercase text-gray-500 mb-6 ml-2">
                                The Collection
                            </h2>
                            
                            <div ref={rowRef} className="flex space-x-8 overflow-x-auto hide-scrollbar py-8 -mx-2 px-4 scroll-smooth">
                                {movies.map((movie, idx) => (
                                    <div 
                                        key={movie.id}
                                        className={`relative flex-shrink-0 transition-all duration-500 ease-out 
                                            ${idx === selectedIndex ? 'scale-110 z-20 ring-4 ring-red-600 shadow-[0_0_40px_rgba(220,38,38,0.6)]' : 'scale-100 opacity-30'}
                                        `}
                                        style={{ width: '200px' }}
                                    >
                                        <img 
                                            src={`https://image.tmdb.org/t/p/w500${movie.poster_path}`}
                                            className="w-full h-[300px] object-cover rounded-xl shadow-2xl"
                                            alt={movie.title}
                                        />
                                        {idx === selectedIndex && (
                                             <div className="absolute -bottom-10 left-0 right-0 flex justify-center">
                                                 <div className="w-2 h-2 rounded-full bg-red-600 animate-ping" />
                                             </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <FilmGrainOverlay />
                </div>
            );
        };

        const FilmGrainOverlay = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const imageData = ctx.createImageData(canvas.width, canvas.height);
                    const data = imageData.data;

                    for (let i = 0; i < data.length; i += 4) {
                        const noise = Math.random() * 255;
                        data[i] = noise;
                        data[i + 1] = noise;
                        data[i + 2] = noise;
                        data[i + 3] = 12; 
                    }

                    ctx.putImageData(imageData, 0, 0);
                    animationFrameId = requestAnimationFrame(render);
                };

                window.addEventListener('resize', resize);
                resize();
                render();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-50 opacity-30 mix-blend-screen" />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- 
      THE "CAR WASH" SCRIPT 
      This runs first. It grabs your code, scrubs the invisible formatting spaces, 
      and then manually feeds it to the compiler.
    -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            try {
                // 1. Grab the raw code you pasted
                const rawCode = document.getElementById('react-app-code').textContent;
                
                // 2. SCRUB: Find every non-breaking space (\u00A0) and replace it with a real space
                const cleanCode = rawCode.replace(/\u00A0/g, ' ');
                
                // 3. Manually trigger the compiler with the clean code
                const compiled = Babel.transform(cleanCode, { presets: ['react'] }).code;
                
                // 4. Run the clean code
                const scriptElement = document.createElement('script');
                scriptElement.textContent = compiled;
                document.body.appendChild(scriptElement);

            } catch(err) {
                // If it still crashes for some other reason, show it.
                document.getElementById('root').innerHTML = `
                    <div style="padding: 40px; color: #ff00de; font-family: monospace; text-align: center; margin-top: 20vh;">
                        <h2>TAPE ERROR: COMPILATION FAILED</h2>
                        <p style="color: white;">${err.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
