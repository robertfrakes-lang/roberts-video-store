<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert's Video Screensaver</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: black; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Share Tech Mono', monospace; 
            cursor: none;
        }

        .vcr-text {
            color: #ebebeb;
            text-shadow: 2px 2px #000, -1px -1px #000, 0 0 10px rgba(255,255,255,0.4);
            filter: blur(0.3px);
            letter-spacing: 2px;
        }

        .neon-pink {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff00de, 0 0 30px #ff00de, 0 0 40px #ff00de;
        }
        .neon-blue {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00d2ff, 0 0 30px #00d2ff, 0 0 40px #00d2ff;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.7; }
        }
        .neon-flicker { animation: flicker 3s infinite; }

        @keyframes tracking {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { top: 110%; opacity: 0; }
        }
        .vhs-tracking {
            position: fixed;
            left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 150;
            animation: tracking 8s infinite linear;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1.05) translate(-50%, -50%); opacity: 0.35; }
            50% { transform: scale(1.1) translate(-50%, -50%); opacity: 0.55; }
        }
        .bg-pulse {
            position: absolute; top: 50%; left: 50%;
            min-width: 110%; min-height: 110%;
            animation: pulse-bg 20s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>
    <div class="vhs-tracking"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- USER CONFIG ---
        const TMDB_API_KEY = "6ae71efb7a4441efb04f3b77764589c3"; 
        const GOOGLE_SHEET_ID = "1qpyC0XzvTcKT6EISywvqESX3A0MwQoFDE8p-Bll4hps"; 
        // TIP: Double-check that this name matches the TAB name at the bottom of your sheet exactly.
        const SHEET_NAME = "Roberts video store application database"; 
        const ROTATION_SPEED = 15000; 

        const RetroLogo = () => (
            <div className="fixed top-8 right-12 z-[110] flex flex-col items-center neon-flicker scale-75 lg:scale-100 origin-top-right">
                <svg width="220" height="100" viewBox="0 0 220 100">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <path d="M10 10 L210 10 L210 90 L10 90 Z" fill="none" stroke="#ff00de" strokeWidth="3" filter="url(#glow)" />
                    <text x="50%" y="42" textAnchor="middle" fill="#fff" style={{fontFamily: 'Archivo Black', fontSize: '18px'}} filter="url(#glow)" className="neon-pink">ROBERT'S</text>
                    <text x="50%" y="72" textAnchor="middle" fill="#fff" style={{fontFamily: 'Archivo Black', fontSize: '24px'}} filter="url(#glow)" className="neon-blue">VIDEO STORE</text>
                </svg>
                <div className="text-[10px] tracking-[0.6em] vcr-text opacity-60 mt-[-10px]">PREMIUM RENTALS</div>
            </div>
        );

        const RetroClock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="fixed bottom-8 left-12 z-[110] vcr-text text-2xl lg:text-3xl space-y-1 opacity-70">
                    <div className="flex items-center gap-4">
                        <span className="text-sm border border-white/40 px-2 py-0.5 font-bold">VCR1</span>
                        <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }).toUpperCase()}</span>
                    </div>
                    <div className="text-lg lg:text-xl opacity-60">
                        {time.toLocaleDateString([], { month: 'short', day: '2-digit', year: 'numeric' }).toUpperCase()}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [movies, setMovies] = useState([]);
            const [index, setIndex] = useState(0);
            const [loading, setLoading] = useState(true);
            const [activeMovie, setActiveMovie] = useState(null);
            const [errorMsg, setErrorMsg] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const cleanId = GOOGLE_SHEET_ID.includes('/d/') ? GOOGLE_SHEET_ID.split('/d/')[1].split('/')[0] : GOOGLE_SHEET_ID;
                        
                        // 1. Fetch from Sheets
                        const sheetUrl = `https://docs.google.com/spreadsheets/d/${cleanId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
                        const response = await fetch(sheetUrl);
                        if (!response.ok) throw new Error("Could not connect to Google Sheet.");
                        
                        const text = await response.text();
                        // Handle the Google JSON format
                        const jsonStart = text.indexOf('{');
                        const jsonEnd = text.lastIndexOf('}');
                        if (jsonStart === -1 || jsonEnd === -1) throw new Error("Invalid response from Google Sheets. Check Tab Name.");
                        
                        const json = JSON.parse(text.substring(jsonStart, jsonEnd + 1));
                        const rows = json.table.rows.map(row => {
                            if (!row.c || !row.c[0]) return null;
                            return { 
                                title: row.c[0]?.v, 
                                label: row.c[1]?.v || "CLASSIC SELECTION" 
                            };
                        }).filter(r => r && r.title);

                        if (rows.length === 0) throw new Error("No movie titles found in your spreadsheet (Column A).");

                        // 2. Fetch from TMDB
                        const enriched = await Promise.all(rows.slice(0, 50).map(async (m) => {
                            try {
                                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(m.title)}`);
                                const data = await res.json();
                                const movie = data.results?.[0];
                                if (!movie) return null;
                                
                                const details = await (await fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&append_to_response=images`)).json();
                                return { 
                                    ...m, 
                                    ...movie, 
                                    logo: details.images?.logos?.find(l => l.iso_639_1 === 'en' || !l.iso_639_1)?.file_path 
                                };
                            } catch (e) {
                                return null;
                            }
                        }));
                        
                        const filtered = enriched.filter(m => m !== null);
                        if (filtered.length === 0) throw new Error("No movie matches found on TMDB. Check your titles.");
                        
                        setMovies(filtered);
                        setActiveMovie(filtered[0]);
                        setLoading(false);
                    } catch (e) { 
                        console.error(e);
                        setErrorMsg(e.message);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (movies.length === 0) return;
                const interval = setInterval(() => setIndex(prev => (prev + 1) % movies.length), ROTATION_SPEED);
                return () => clearInterval(interval);
            }, [movies]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.keyCode === 39) setIndex(prev => (prev + 1) % movies.length);
                    if (e.keyCode === 37) setIndex(prev => (prev - 1 + movies.length) % movies.length);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [movies]);

            useEffect(() => { if (movies[index]) setActiveMovie(movies[index]); }, [index, movies]);

            if (errorMsg) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center p-10 text-center">
                    <div className="vcr-text text-2xl text-red-500 mb-6 jitter-fx">SYSTEM ERROR</div>
                    <div className="vcr-text text-lg opacity-80 max-w-xl">{errorMsg}</div>
                    <div className="mt-10 text-xs text-white/20 uppercase tracking-widest">
                        Check Sheet ID: {GOOGLE_SHEET_ID.substring(0, 8)}...<br/>
                        Check Tab Name: "{SHEET_NAME}"
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center vcr-text text-3xl">
                    <div className="animate-pulse tracking-widest">TRACKING TAPE...</div>
                </div>
            );

            return (
                <div className="h-screen w-screen bg-black overflow-hidden relative">
                    <RetroLogo />
                    <RetroClock />

                    {/* Dynamic Background */}
                    <div className="absolute inset-0">
                        <img 
                            key={`bg-${activeMovie?.id}`}
                            src={`https://image.tmdb.org/t/p/original${activeMovie?.backdrop_path}`}
                            className="bg-pulse object-cover blur-2xl"
                        />
                        <div className="absolute inset-0 bg-black/50" />
                    </div>

                    {/* Main Visual Content */}
                    <div className="relative z-10 h-full flex flex-col items-center justify-center p-12 lg:p-24">
                        <div className="flex flex-col lg:flex-row items-center gap-12 lg:gap-20 max-w-7xl w-full animate-in fade-in duration-1000">
                            
                            <div className="relative flex-shrink-0 shadow-[0_0_80px_rgba(0,0,0,1)]">
                                <img 
                                    key={`poster-${activeMovie?.id}`}
                                    src={`https://image.tmdb.org/t/p/w780${activeMovie?.poster_path}`}
                                    className="h-[60vh] lg:h-[75vh] w-auto border-[6px] border-white/10 rounded-sm"
                                />
                                <div className="absolute top-6 -right-6 lg:-right-10 bg-yellow-400 text-black px-3 py-1 font-black transform rotate-12 shadow-xl border-2 border-black text-[10px] lg:text-xs uppercase tracking-tighter">
                                    PROPERTY OF ROBERT'S
                                </div>
                                <div className="absolute -bottom-4 -left-6 bg-red-600 text-white px-5 py-2 font-black italic transform -rotate-3 shadow-2xl text-xs lg:text-sm uppercase">
                                    {activeMovie?.label}
                                </div>
                            </div>

                            <div className="flex flex-col items-center lg:items-start text-center lg:text-left space-y-8 lg:space-y-12 flex-1">
                                {activeMovie?.logo ? (
                                    <img 
                                        key={`logo-${activeMovie?.id}`}
                                        src={`https://image.tmdb.org/t/p/w500${activeMovie.logo}`} 
                                        className="h-28 lg:h-52 object-contain brightness-125 drop-shadow-[0_0_30px_rgba(0,0,0,0.5)]"
                                    />
                                ) : (
                                    <h1 className="text-6xl lg:text-8xl font-black uppercase italic tracking-tighter text-white drop-shadow-2xl">{activeMovie?.title}</h1>
                                )}
                                
                                <p className="text-xl lg:text-3xl text-white/90 leading-snug italic font-medium max-w-2xl drop-shadow-lg line-clamp-4 lg:line-clamp-none">
                                    "{activeMovie?.overview}"
                                </p>
                            </div>
                        </div>
                    </div>

                    <FilmGrain />
                </div>
            );
        };

        const FilmGrain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const imageData = ctx.createImageData(canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const noise = Math.random() * 255;
                        data[i] = noise; data[i+1] = noise; data[i+2] = noise; data[i+3] = 20;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    requestAnimationFrame(render);
                };
                window.addEventListener('resize', resize);
                resize(); render();
            }, []);
            return <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 120, opacity: 0.35 }} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
