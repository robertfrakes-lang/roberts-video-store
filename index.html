<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Cinema OS</title>
    <!-- Pinned Stable Libraries -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { background-color: black; margin: 0; overflow: hidden; cursor: none; color: white; font-family: sans-serif; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 1.5s ease-in-out forwards; }

        /* Retro CRT Scanline Effects */
        @keyframes scanline-sweep {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        .scanline-bar {
            animation: scanline-sweep 8s linear infinite;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
        }
        .crt-grid {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; background-color: black; display: flex; align-items: center; justify-content: center;">
            <h1 style="color: #dc2626; font-size: 2rem; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.2em; animation: pulse 2s infinite;">
                BOOTING CINEMA OS...
            </h1>
        </div>
    </div>

    <script>
        window.addEventListener('error', function(e) {
            if (e.message && e.message.includes('import call expects')) return; // Ignore Vercel injections
            var rootDiv = document.getElementById('root');
            if (rootDiv && rootDiv.innerHTML.includes('BOOTING CINEMA OS')) {
                rootDiv.innerHTML = '<div style="padding:40px; color:#ff00de; font-family:\'Share Tech Mono\', monospace; text-align:center; margin-top:20vh;"><h2>FATAL SYSTEM FAULT</h2><p style="color:white;">' + e.message + '</p></div>';
            }
        });

        // Force Babel to use classic runtime
        Babel.registerPreset('react-classic', {
            presets: [ [Babel.availablePresets['react'], { "runtime": "classic" }] ]
        });
    </script>

    <script type="text/babel" data-presets="react-classic">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */

        const { useState, useEffect, useRef, useCallback } = React;

        const FilmIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>;
        const AlertCircleIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        const TMDB_API_KEY = "6ae71efb7a4441efb04f3b77764589c3"; 
        const GOOGLE_SHEET_PUBLISHED_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpYGbkD2AliFONt-zZz2wXOHXR1z6nHRdnF00KW-e66JwK18f_NIXtYp0cGC1s1JzeIG3UznGt6b0w/pubhtml"; 

        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            // Positioned exactly where you requested: Lower Left
            return (
                <div className="absolute bottom-12 left-16 font-mono text-5xl font-bold tracking-widest text-white/50 z-40 drop-shadow-lg" style={{fontFamily: "'Share Tech Mono', monospace"}}>
                    {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                </div>
            );
        };

        const App = () => {
            const [movies, setMovies] = useState([]);
            const [activeMovie, setActiveMovie] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isDetailsOpen, setIsDetailsOpen] = useState(false);

            //            // Refs to allow our background timer to see current state without resetting
            const masterSheetRef = useRef([]);
            const isDetailsOpenRef = useRef(false);
            
            useEffect(() => {
                isDetailsOpenRef.current = isDetailsOpen;
            }, [isDetailsOpen]);

            // Fetch the bulletproof CSV data from Google
            const fetchSheetData = useCallback(async () => {
                try {
                    const url = GOOGLE_SHEET_PUBLISHED_URL.replace(/\/pubhtml.*/, '/pub?output=csv');
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Google Sheets rejected the connection.");
                    
                    const csvText = await response.text();
                    const parsedRows = [];
                    let quote = false;
                    let row = 0, col = 0;
                    for (let c = 0; c < csvText.length; c++) {
                        let cc = csvText[c], nc = csvText[c+1];
                        parsedRows[row] = parsedRows[row] || [];
                        parsedRows[row][col] = parsedRows[row][col] || '';
                        if (cc === '"' && quote && nc === '"') { parsedRows[row][col] += cc; ++c; continue; }
                        if (cc === '"') { quote = !quote; continue; }
                        if (cc === ',' && !quote) { ++col; continue; }
                        if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                        if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                        parsedRows[row][col] += cc;
                    }

                    return parsedRows.map(r => ({
                        title: r[0]?.trim(), 
                        collectionInfo: r[1]?.trim() || null, 
                    })).filter(m => m.title && m.title.toLowerCase() !== 'title' && m.title.toLowerCase() !== 'name');
                } catch (err) {
                    setError("Database Connection Error: " + err.message);
                    return [];
                }
            }, []);

            const fetchTMDBData = async (movieTitle) => {
                if (!TMDB_API_KEY) return null;
                try {
                    const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(movieTitle)}`;
                    const res = await fetch(searchUrl);
                    if (!res.ok) return null; 
                    
                    const data = await res.json();
                    const movie = data.results[0];
                    if (!movie) return null;

                    const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&append_to_response=images,videos`;
                    const detailRes = await fetch(detailUrl);
                    
                    // If the deep details fail but search worked, return basic movie data so the app doesn't crash
                    if (!detailRes.ok) return movie; 
                    
                    const details = await detailRes.json();
                    const trailer = details.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');

                    return {
                        ...movie,
                        logo: details.images?.logos?.find(l => l.iso_639_1 === 'en' || !l.iso_639_1)?.file_path,
                        trailerKey: trailer ? trailer.key : null,
                        fullDetails: details
                    };
                } catch (err) {
                    return null;
                }
            };

            //            // The Engine that fetches 40 random movies
            const loadBatch = async (allMovies) => {
                if (!allMovies || allMovies.length === 0) return;
                
                const shuffled = [...allMovies].sort(() => 0.5 - Math.random());
                const batch = shuffled.slice(0, 40);
                
                const enriched = await Promise.all(
                    batch.map(async (m) => {
                        const tmdb = await fetchTMDBData(m.title);
                        return tmdb ? { ...m, ...tmdb } : null;
                    })
                );
                
                const valid = enriched.filter(m => m !== null);
                
                if (valid.length > 0) {
                    setMovies(valid);
                    // Only forcefully change the poster if they aren't actively watching a trailer
                    if (!isDetailsOpenRef.current) {
                        setActiveMovie(valid[Math.floor(Math.random() * valid.length)]);
                    }
                }
                return valid;
            };

            //            // 1. Initial Boot Sequence
            useEffect(() => {
                const bootOS = async () => {
                    setLoading(true);
                    const sheetMovies = await fetchSheetData();
                    masterSheetRef.current = sheetMovies;
                    
                    const validMovies = await loadBatch(sheetMovies);
                    
                    if ((!validMovies || validMovies.length === 0) && sheetMovies.length > 0) {
                        setError("TMDB Servers are currently experiencing a 502 Outage. Please try again in a few minutes.");
                    }
                    setLoading(false);
                };
                bootOS();
            }, [fetchSheetData]);

            //            // 2. The 10-Minute Silent Background Reshuffle
            useEffect(() => {
                // 600,000 milliseconds = exactly 10 minutes
                const refreshTimer = setInterval(() => {
                    // If they are watching a trailer, skip this reshuffle and let them enjoy the movie
                    if (isDetailsOpenRef.current) return;
                    
                    // Otherwise, silently download the next 40 movies
                    if (masterSheetRef.current.length > 0) {
                        loadBatch(masterSheetRef.current);
                    }
                }, 600000); 

                return () => clearInterval(refreshTimer);
            }, []);

            // Random Rotator Logic (Every 15 Seconds)
            useEffect(() => {
                if (movies.length <= 1 || isDetailsOpen) return;
                
                const interval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * movies.length);
                    setActiveMovie(movies[randomIndex]);
                }, 15000); 

                return () => clearInterval(interval);
            }, [movies, isDetailsOpen]);

            // Fire TV Remote Control Logic
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (movies.length === 0) return;
                    
                    // Enter / Select / Play opens Details & Trailer Modal
                    if (!isDetailsOpen && (e.keyCode === 13 || e.key === 'Enter' || e.keyCode === 179)) {
                        setIsDetailsOpen(true);
                    }
                    
                    // Escape / Back closes Modal and returns to rotation
                    if (isDetailsOpen && (e.keyCode === 27 || e.key === 'Escape' || e.keyCode === 8)) {
                        setIsDetailsOpen(false);
                    }
                };
                
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [movies, isDetailsOpen]);

            if (error) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center text-white p-10 text-center font-sans">
                    <AlertCircleIcon size={64} className="text-red-500 mb-4" />
                    <h2 className="text-2xl font-bold mb-2 tracking-widest uppercase">Database Error</h2>
                    <p className="text-gray-400 max-w-md">{error}</p>
                </div>
            );

            if (loading) return (
                <div className="h-screen bg-black flex items-center justify-center text-white font-sans">
                    <div className="animate-pulse flex flex-col items-center">
                        <FilmIcon size={64} className="mb-4 text-red-600" />
                        <p className="text-2xl tracking-[0.3em] uppercase font-black text-red-600" style={{fontFamily: "'Share Tech Mono', monospace"}}>Opening Vault...</p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-screen bg-black overflow-hidden relative font-sans text-white">
                    
                    {/* The Background Movie Image */}
                    <div className="absolute inset-0 transition-opacity duration-1000 animate-fade-in" key={`bg-${activeMovie?.id}`}>
                        <img 
                            src={`https://image.tmdb.org/t/p/original${activeMovie?.backdrop_path}`}
                            className="w-full h-full object-cover opacity-60"
                            alt=""
                        />
                        <div className="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent" />
                    </div>

                    {/* CRT Screen Effects */}
                    <div className="absolute inset-0 crt-grid z-30" />
                    <div className="absolute inset-0 z-30 pointer-events-none h-[15%] scanline-bar" />

                    {/* Lower Left Clock */}
                    {!isDetailsOpen && <Clock />}

                    {/* Main Idle UI */}
                    {!isDetailsOpen && (
                        <div className="relative z-20 h-full flex flex-col justify-center p-16 animate-fade-in" key={`ui-${activeMovie?.id}`}>
                            <div className="max-w-3xl">
                                {activeMovie?.logo ? (
                                    <img 
                                        src={`https://image.tmdb.org/t/p/w500${activeMovie.logo}`}
                                        className="h-32 mb-6 object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]"
                                        alt="logo"
                                    />
                                ) : (
                                    <h1 className="text-7xl font-black italic uppercase tracking-tighter mb-4 leading-none" style={{fontFamily: "'Archivo Black', sans-serif"}}>
                                        {activeMovie?.title}
                                    </h1>
                                )}
                                
                                <div className="mt-12 flex items-center space-x-4 bg-black/60 border border-white/20 backdrop-blur-md w-fit px-6 py-3 rounded-full animate-pulse">
                                    <div className="w-4 h-4 rounded-full bg-red-600" />
                                    <span className="text-xl font-bold tracking-[0.2em] uppercase">Press OK for Details</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Details & Trailer Modal */}
                    {isDetailsOpen && (
                        <div className="absolute inset-0 z-50 bg-black/95 flex flex-row animate-fade-in">
                            
                            {/* Left Side: Details */}
                            <div className="w-1/3 h-full p-16 flex flex-col justify-center border-r border-white/10 bg-black z-10 relative">
                                <h2 className="text-4xl font-black tracking-tighter uppercase mb-2" style={{fontFamily: "'Archivo Black', sans-serif"}}>
                                    {activeMovie?.title}
                                </h2>
                                
                                <div className="flex items-center space-x-3 mb-8 text-sm font-bold tracking-widest text-gray-400">
                                    <span className="text-white">{activeMovie?.release_date?.split('-')[0]}</span>
                                    <span>•</span>
                                    <span>{activeMovie?.fullDetails?.genres?.map(g => g.name).slice(0, 2).join(', ')}</span>
                                </div>
                                
                                <p className="text-xl text-gray-300 leading-relaxed mb-12">
                                    {activeMovie?.overview}
                                </p>
                                
                                <div className="mt-auto flex items-center space-x-4 text-gray-500 font-bold uppercase tracking-widest">
                                    <div className="border-2 border-gray-500 px-3 py-1 rounded-full text-sm">BACK</div>
                                    <span>To Return</span>
                                </div>
                            </div>
                            
                            {/* Right Side: Auto-playing Trailer */}
                            <div className="w-2/3 h-full flex items-center justify-center bg-zinc-900 relative">
                                {activeMovie?.trailerKey ? (
                                    <iframe 
                                        className="w-full h-full"
                                        style={{ transform: 'translateZ(0)' }}
                                        src={`https://www.youtube.com/embed/${activeMovie.trailerKey}?autoplay=1&controls=1&modestbranding=1&rel=0`} 
                                        title="Trailer" 
                                        frameBorder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowFullScreen
                                    ></iframe>
                                ) : (
                                    <div className="text-center">
                                        <AlertCircleIcon size={64} className="mx-auto text-gray-600 mb-4" />
                                        <p className="text-2xl text-gray-500 font-mono tracking-widest uppercase">No Vault Transmission</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
